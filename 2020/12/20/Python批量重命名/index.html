<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">#!/usr/bin/env python</span></span><br><span class="line"><span class="comment"># -*- coding: utf-8 -*-</span></span><br><span class="line"><span class="comment"># @Date    : 2020-12-19 15:02:56</span></span><br><span class="line"><span class="comment"># @Author  : KY (xxxxxx@g.com)</span></span><br><span class="line"><span class="comment"># @Link    : http://example.org</span></span><br><span class="line"><span class="comment"># @Version : $Id$</span></span><br><span class="line"></span><br><span class="line"><span class="keyword">import</span> os</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">rename</span>():</span></span><br><span class="line">    name = <span class="string">&quot;p&quot;</span>;</span><br><span class="line">    count = <span class="number">0</span>;</span><br><span class="line">    path = <span class="string">&quot;F:\Pictures\Assets&quot;</span> <span class="comment">#文件所在路径</span></span><br><span class="line"></span><br><span class="line">    filelist = os.listdir(path) <span class="comment">#该文件夹下所有的文件（包括文件夹）</span></span><br><span class="line">    <span class="keyword">for</span> files <span class="keyword">in</span> filelist: <span class="comment">#遍历所有文件</span></span><br><span class="line">        Olddir = os.path.join(path,files) <span class="comment">#原来的文件路径</span></span><br><span class="line">        <span class="keyword">if</span> os.path.isdir(Olddir): <span class="comment">#如果是文件夹就跳过</span></span><br><span class="line">            <span class="keyword">continue</span></span><br><span class="line">        filename = os.path.splitext(files)[<span class="number">0</span>] <span class="comment">#文件名</span></span><br><span class="line">        filetype = os.path.splitext(files)[<span class="number">1</span>] <span class="comment">#扩展名</span></span><br><span class="line">        Newdir = os.path.join(path,<span class="built_in">str</span>(name)+<span class="built_in">str</span>(count)+filetype) <span class="comment">#新文件路径</span></span><br><span class="line">        os.rename(Olddir,Newdir) <span class="comment">#重新命名</span></span><br><span class="line">        count += <span class="number">1</span></span><br><span class="line">rename()</span><br></pre></td></tr></table></figure>
